apiVersion: helm.toolkit.fluxcd.io/v2beta1
kind: HelmRelease
metadata:
  name: nginx
spec:
  releaseName: ingress-nginx
  chart:
    spec:
      chart: ingress-nginx
      sourceRef:
        kind: HelmRepository
        name: ingress-nginx
        namespace: flux-system
      version: "4.11.8"
  interval: 0h30m0s
  install:
    remediation:
      retries: 3
  values:
    controller:
      # Un-pinned for Phase 3 (k3s upgrade): the pi-gamma host-local IPAM leak is
      # resolved and all agents allocate pod IPs, so the controller no longer needs
      # to be tied to kube-master. Leaving it schedulable lets it ride out
      # kube-master's own k3s upgrade on an agent instead of going down with it.
      service:
        type: LoadBalancer
        externalTrafficPolicy: Local
      config:
        use-gzip: true
        gzip-level: 9
        brotli-level: 6
        enable-brotli: true

