apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: nginx
spec:
  releaseName: ingress-nginx
  chart:
    spec:
      chart: ingress-nginx
      sourceRef:
        kind: HelmRepository
        name: ingress-nginx
        namespace: flux-system
      version: "4.14.5"
  interval: 0h30m0s
  install:
    remediation:
      retries: 3
  values:
    controller:
      # Un-pinned for Phase 3. The pi-gamma host-local IPAM leak that forced the
      # earlier pin was cleared at the node level (rm /var/lib/cni/networks/cbr0
      # + k3s-agent restart); all agents now allocate pod IPs (verified with a
      # 40-pod fill test). Leaving the controller schedulable lets it ride out
      # kube-master's own k3s upgrade on an agent instead of going down with it.
      service:
        type: LoadBalancer
        externalTrafficPolicy: Local
      config:
        use-gzip: true
        gzip-level: 9
        brotli-level: 6
        enable-brotli: true

