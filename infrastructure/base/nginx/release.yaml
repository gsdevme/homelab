apiVersion: helm.toolkit.fluxcd.io/v2beta1
kind: HelmRelease
metadata:
  name: nginx
spec:
  releaseName: ingress-nginx
  chart:
    spec:
      chart: ingress-nginx
      sourceRef:
        kind: HelmRepository
        name: ingress-nginx
        namespace: flux-system
      version: "4.11.8"
  interval: 0h30m0s
  install:
    remediation:
      retries: 3
  values:
    controller:
      # Pinned to the control-plane node while the pi-gamma flannel/host-local
      # IPAM leak is unresolved and the arm64 agents are cordoned. This keeps the
      # controller and the admission-webhook hook Jobs on a node with free pod IPs.
      # REVISIT before Phase 3: pinning the controller to the single control-plane
      # node means ingress is briefly down when kube-master drains for its own
      # k3s upgrade (expected for a single-server control plane, but be aware).
      nodeSelector:
        kubernetes.io/hostname: kube-master
      admissionWebhooks:
        patch:
          nodeSelector:
            kubernetes.io/hostname: kube-master
      service:
        type: LoadBalancer
        externalTrafficPolicy: Local
      config:
        use-gzip: true
        gzip-level: 9
        brotli-level: 6
        enable-brotli: true

