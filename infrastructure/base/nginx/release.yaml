apiVersion: helm.toolkit.fluxcd.io/v2beta1
kind: HelmRelease
metadata:
  name: nginx
spec:
  releaseName: ingress-nginx
  chart:
    spec:
      chart: ingress-nginx
      sourceRef:
        kind: HelmRepository
        name: ingress-nginx
        namespace: flux-system
      version: "4.11.8"
  interval: 0h30m0s
  install:
    remediation:
      retries: 3
  values:
    controller:
      # Pinned to the control-plane node. The pi-gamma host-local IPAM leak is
      # NOT actually resolved: a brief un-pin (a8c331e) showed pi-gamma's
      # 10.42.3.0/24 is still exhausted ("no IP addresses available in range
      # set") despite only ~8 pods, so the admission-webhook hook Job could not
      # get a pod IP there. Keep the controller + patch Job on kube-master (free
      # IPs) until pi-gamma's /var/lib/cni/networks/cbr0 is cleared at the node
      # level. REVISIT / un-pin only once that leak is genuinely fixed.
      nodeSelector:
        kubernetes.io/hostname: kube-master
      admissionWebhooks:
        patch:
          nodeSelector:
            kubernetes.io/hostname: kube-master
      service:
        type: LoadBalancer
        externalTrafficPolicy: Local
      config:
        use-gzip: true
        gzip-level: 9
        brotli-level: 6
        enable-brotli: true

