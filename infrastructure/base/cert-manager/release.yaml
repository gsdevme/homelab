apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: cert-manager
spec:
  releaseName: cert-manager
  chart:
    spec:
      chart: cert-manager
      sourceRef:
        kind: HelmRepository
        name: jetstack
        namespace: flux-system
      version: "1.20.3"
  interval: 1h0m0s
  install:
    remediation:
      retries: 3
  values:
    # v1.15+ replaced `installCRDs` with the `crds` block. keep=true retains the
    # CRDs (and issued certs) if the release is ever removed.
    crds:
      enabled: true
      keep: true
